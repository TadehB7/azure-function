# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core project to Azure Function App - weatheremailservice

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './src/WeatherEmailFunction' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '10.0.x' # set this to the dotnet version to use
  FUNCTION_APP_NAME: weatheremailservice

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_680772A1B7CD493FA97C26C7D38C1276 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E97C29AA33B848D4A047DCFA1FC7BA02 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EA3E1B602646449E8E29189070786D7F }}

      - name: Set Azure Function App Settings
        uses: Azure/appservice-settings@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          app-settings-json: |
            [
              {
                "name": "EmailUser",
                "value": "${{ secrets.EMAIL_USER }}",
                "slotSetting": false
              },
              {
                "name": "EmailPassword",
                "value": "${{ secrets.EMAIL_PASSWORD }}",
                "slotSetting": false
              },
              {
                "name": "RecipientEmail",
                "value": "${{ secrets.RECIPIENT_EMAIL }}",
                "slotSetting": false
              },
              {
                "name": "WeatherCronExpression",
                "value": "0 */5 * * * *",
                "slotSetting": false
              },
              {
                "name": "FUNCTIONS_WORKER_RUNTIME",
                "value": "dotnet-isolated",
                "slotSetting": false
              }
            ]

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'weatheremailservice'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
          