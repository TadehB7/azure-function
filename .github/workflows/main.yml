on:
  push:
    branches:
      - main

env:
  FUNCTION_APP_NAME: your-function-app-name
  DOTNET_VERSION: '10.0.x'
  PUBLISH_FOLDER: './publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --output ${{ env.PUBLISH_FOLDER }} --no-build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure Function App Settings
        uses: Azure/appservice-settings@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          app-settings-json: |
            [
              {
                "name": "EmailUser",
                "value": "${{ secrets.EMAIL_USER }}",
                "slotSetting": false
              },
              {
                "name": "EmailPassword",
                "value": "${{ secrets.EMAIL_PASSWORD }}",
                "slotSetting": false
              },
              {
                "name": "RecipientEmail",
                "value": "${{ secrets.RECIPIENT_EMAIL }}",
                "slotSetting": false
              },
              {
                "name": "WeatherCronExpression",
                "value": "0 */5 * * * *",
                "slotSetting": false
              },
              {
                "name": "FUNCTIONS_WORKER_RUNTIME",
                "value": "dotnet-isolated",
                "slotSetting": false
              }
            ]

      - name: Deploy to Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ${{ env.PUBLISH_FOLDER }}
        uses: Azure/appservice-settings@v1
        with:
          app-name: your-function-app-name
          app-settings-json: |
            [
              {
                "name": "EmailUser",
                "value": "${{ secrets.EMAIL_USER }}",
                "slotSetting": false
              },
              {
                "name": "EmailPassword",
                "value": "${{ secrets.EMAIL_PASSWORD }}",
                "slotSetting": false
              },
              {
                "name": "RecipientEmail",
                "value": "${{ secrets.RECIPIENT_EMAIL }}",
                "slotSetting": false
              },
              {
                "name": "WeatherCronExpression",
                "value": "0 */5 * * * *",
                "slotSetting": false
              }
            ]

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: your-function-app-name
          package: ./publish